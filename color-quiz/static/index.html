<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Index</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      display: flex; flex-direction: column;
      justify-content: center; min-height: 82vh; max-width: 600px;
    }
    .dots { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.8rem; max-width: 220px; }
    .dot  { width: 12px; height: 12px; border-radius: 50%; }

    h1 {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 1rem;
    }
    .tagline {
      color: var(--muted); font-size: 1rem; line-height: 1.75; margin-bottom: 2.5rem;
    }
    .who-label {
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.9rem;
    }
    .name-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem; max-width: 500px;
    }
    .name-btn {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 0.85rem 1rem;
      font-size: 1rem; font-weight: 600; color: var(--muted);
      cursor: pointer; text-align: center;
      transition: all 0.15s; letter-spacing: -0.01em;
    }
    .name-btn:hover {
      border-color: rgba(255,255,255,0.4); color: var(--text);
      background: rgba(255,255,255,0.05); transform: translateY(-1px);
    }
    .name-btn.already {
      opacity: 0.4;
    }
    .name-btn.already:hover {
      opacity: 0.7;
    }
    .already-label {
      font-size: 0.65rem; color: var(--green);
      display: block; margin-top: 0.25rem; letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Aura Index</div>
    <div class="hero">
      <div class="dots">
        <div class="dot" style="background:#E63946;box-shadow:0 0 8px rgba(230,57,70,0.7)"></div>
        <div class="dot" style="background:#FB5607;box-shadow:0 0 8px rgba(251,86,7,0.7)"></div>
        <div class="dot" style="background:#FFB703;box-shadow:0 0 8px rgba(255,183,3,0.7)"></div>
        <div class="dot" style="background:#2DC653;box-shadow:0 0 8px rgba(45,198,83,0.7)"></div>
        <div class="dot" style="background:#14B8A6;box-shadow:0 0 8px rgba(20,184,166,0.7)"></div>
        <div class="dot" style="background:#4895EF;box-shadow:0 0 8px rgba(72,149,239,0.7)"></div>
        <div class="dot" style="background:#4338CA;box-shadow:0 0 8px rgba(67,56,202,0.7)"></div>
        <div class="dot" style="background:#9B59F5;box-shadow:0 0 8px rgba(155,89,245,0.7)"></div>
        <div class="dot" style="background:#C9A84C;box-shadow:0 0 8px rgba(201,168,76,0.7)"></div>
        <div class="dot" style="background:#F06090;box-shadow:0 0 8px rgba(240,96,144,0.7)"></div>
      </div>
      <h1>Who are you?</h1>
      <p class="tagline">
        Select your name to begin. You'll describe each person in the group —
        then yourself. No right answers.
      </p>
      <div class="who-label">Select your name</div>
      <div class="name-grid" id="nameGrid">
        <div style="color:var(--muted);font-size:0.85rem;grid-column:1/-1">Loading&hellip;</div>
      </div>
    </div>
  </div>

  <script>
    async function init() {
      const [partResp, statusResp] = await Promise.all([
        fetch('/api/participants'),
        fetch('/api/status'),
      ]);
      const { participants } = await partResp.json();
      const { submitted }    = await statusResp.json();

      const grid = document.getElementById('nameGrid');
      grid.innerHTML = '';

      participants.forEach(name => {
        const done = submitted.includes(name);
        const btn  = document.createElement('button');
        btn.className = 'name-btn' + (done ? ' already' : '');
        btn.innerHTML = done
          ? `${name}<span class="already-label">✓ submitted</span>`
          : name;
        btn.addEventListener('click', () => {
          window.location.href = `/quiz.html?name=${encodeURIComponent(name)}`;
        });
        grid.appendChild(btn);
      });
    }

    init();
  </script>
</body>
</html>
