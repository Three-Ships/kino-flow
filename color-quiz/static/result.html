<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Color — Aura Index</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow-x: hidden; }

    .result-bg {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: 0;
      transition: opacity 1.6s ease;
    }
    .result-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .result-inner {
      max-width: 620px; width: 100%;
      padding: 3rem 1.5rem; text-align: center;
    }

    .orb-wrap {
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s,
                  transform 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s;
    }
    .orb-wrap.show { opacity: 1; transform: scale(1); }

    .orb {
      width: 150px; height: 150px; border-radius: 50%;
      margin: 0 auto 2.2rem;
      animation: orbPulse 3.5s ease-in-out infinite;
    }

    .text-content {
      opacity: 0; transform: translateY(18px);
      transition: opacity 0.7s ease 1s, transform 0.7s ease 1s;
    }
    .text-content.show { opacity: 1; transform: none; }

    .person-name {
      font-size: 0.8rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      margin-bottom: 0.3rem;
    }
    .archetype-label {
      font-size: 0.85rem; letter-spacing: 0.22em;
      text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .color-name {
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 800; letter-spacing: -0.04em;
      line-height: 1; margin-bottom: 1.8rem;
    }
    .description {
      font-size: 1.05rem; line-height: 1.8;
      color: rgba(255,255,255,0.75); margin-bottom: 1.8rem;
    }
    .strengths {
      display: flex; flex-wrap: wrap; gap: 0.45rem;
      justify-content: center; margin-bottom: 1.8rem;
    }
    .strength-tag {
      border-radius: 100px; padding: 0.38rem 0.9rem;
      font-size: 0.82rem; font-weight: 500; border: 1.5px solid;
    }
    .team-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 16px; padding: 1.2rem 1.5rem;
      text-align: left; margin-bottom: 1.5rem;
    }
    .team-label {
      font-size: 0.68rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-bottom: 0.4rem;
    }
    .team-text { font-size: 0.95rem; line-height: 1.65; color: rgba(255,255,255,0.7); }

    .why-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 1.2rem 1.5rem;
      text-align: left; margin-bottom: 2.5rem;
    }
    .why-label {
      font-size: 0.68rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-bottom: 0.8rem;
    }
    .why-words { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
    .why-word  {
      border-radius: 100px; padding: 0.3rem 0.8rem;
      font-size: 0.8rem; font-weight: 500; border: 1.5px solid;
    }
    .why-text  { font-size: 0.85rem; line-height: 1.65; color: rgba(255,255,255,0.5); }
    .peer-note {
      display: inline-block; font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 100px;
      padding: 0.25rem 0.7rem; margin-bottom: 1rem;
      background: rgba(255,183,3,0.1); border: 1px solid rgba(255,183,3,0.3);
      color: #FFB703;
    }

    .not-ready {
      text-align: center; padding: 5rem 2rem; color: var(--muted);
    }
    .not-ready .big { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  </style>
</head>
<body>
  <div id="resultBg" class="result-bg"></div>
  <div class="result-wrap">
    <div class="result-inner">

      <div id="loadingState" style="text-align:center;padding:5rem 0;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:1rem;animation:orbPulse 1.5s ease-in-out infinite">◎</div>
        Loading&hellip;
      </div>

      <div id="notReadyState" class="not-ready" style="display:none">
        <div class="big">◎</div>
        <p style="font-size:1rem;font-weight:600;margin-bottom:0.5rem">Colors haven't been assigned yet.</p>
        <p style="font-size:0.85rem">Check back after your facilitator runs the calculation.</p>
      </div>

      <div id="resultContent" style="display:none">
        <div class="orb-wrap" id="orbWrap">
          <div class="orb" id="orb"></div>
        </div>
        <div class="text-content" id="textContent">
          <div class="person-name"  id="personName"></div>
          <div class="archetype-label" id="archetypeLabel"></div>
          <div class="color-name"   id="colorName"></div>
          <div class="description"  id="description"></div>
          <div class="strengths"    id="strengths"></div>
          <div class="team-box">
            <div class="team-label">In your team</div>
            <div class="team-text" id="teamRole"></div>
          </div>
          <div class="why-box" id="whyBox" style="display:none">
            <div class="why-label">Why this color</div>
            <div id="peerNote"></div>
            <div class="why-words" id="whyWords"></div>
            <div class="why-text" id="whyText"></div>
          </div>
          <a href="/" style="display:inline-block;color:rgba(255,255,255,0.3);font-size:0.85rem;text-decoration:none;border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:0.5rem 1.2rem;transition:all 0.2s" onmouseover="this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.color='rgba(255,255,255,0.3)'">← Back</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    const COLOR_HEX  = { red:'#E63946', orange:'#FB5607', yellow:'#FFB703', green:'#2DC653', teal:'#14B8A6', blue:'#4895EF', indigo:'#4338CA', purple:'#9B59F5', gold:'#C9A84C', rose:'#F06090' };
    const COLOR_GLOW = { red:'rgba(230,57,70,0.32)', orange:'rgba(251,86,7,0.32)', yellow:'rgba(255,183,3,0.32)', green:'rgba(45,198,83,0.32)', teal:'rgba(20,184,166,0.32)', blue:'rgba(72,149,239,0.32)', indigo:'rgba(67,56,202,0.32)', purple:'rgba(155,89,245,0.32)', gold:'rgba(201,168,76,0.32)', rose:'rgba(240,96,144,0.32)' };

    async function load() {
      const name = decodeURIComponent(new URLSearchParams(window.location.search).get('name') || '');
      if (!name) { window.location.href = '/'; return; }

      const resp = await fetch(`/api/result/${encodeURIComponent(name)}`);

      document.getElementById('loadingState').style.display = 'none';

      if (resp.status === 404) {
        document.getElementById('notReadyState').style.display = 'block';
        return;
      }

      const data    = await resp.json();
      const c       = data.color;
      const hex     = COLOR_HEX[c];
      const glow    = COLOR_GLOW[c];
      const profile = data.profile;

      document.getElementById('resultBg').style.background =
        `radial-gradient(ellipse 80% 70% at 50% 55%, ${glow} 0%, transparent 65%)`;

      const orb = document.getElementById('orb');
      orb.style.background = hex;
      orb.style.boxShadow  = `0 0 60px ${glow}, 0 0 120px ${glow}`;

      document.getElementById('personName').textContent     = name.toUpperCase();
      document.getElementById('archetypeLabel').textContent = profile.archetype.toUpperCase();
      document.getElementById('archetypeLabel').style.color = hex;
      document.getElementById('colorName').textContent      = profile.name;
      document.getElementById('colorName').style.color      = hex;
      document.getElementById('description').textContent    = profile.description;
      document.getElementById('teamRole').textContent       = profile.team_role;

      profile.strengths.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'strength-tag';
        tag.textContent = s;
        tag.style.borderColor = hex + '70';
        tag.style.color = hex;
        document.getElementById('strengths').appendChild(tag);
      });

      // Why this color
      const topWords = data.top_words || [];
      if (topWords.length > 0) {
        const wordsEl = document.getElementById('whyWords');
        topWords.forEach(w => {
          const tag = document.createElement('span');
          tag.className = 'why-word';
          tag.textContent = w.word;
          tag.style.borderColor = hex + '70';
          tag.style.color = hex;
          wordsEl.appendChild(tag);
        });
        document.getElementById('whyText').textContent = data.why_text || '';
        if (!data.self_submitted) {
          const note = document.createElement('div');
          note.className = 'peer-note';
          note.textContent = 'Peer ratings only — you weren\'t present to rate yourself';
          document.getElementById('peerNote').appendChild(note);
        }
        document.getElementById('whyBox').style.display = 'block';
      }

      document.getElementById('resultContent').style.display = 'block';
      setTimeout(() => document.getElementById('resultBg').style.opacity   = '1', 80);
      setTimeout(() => document.getElementById('orbWrap').classList.add('show'),   200);
      setTimeout(() => document.getElementById('textContent').classList.add('show'), 900);
    }

    load();
  </script>
</body>
</html>
