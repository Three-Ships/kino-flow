<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Index — Quiz</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-title {
      font-size: clamp(1.5rem, 3.5vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.25;
    }
    .quiz-subtitle { color: var(--muted); font-size: 0.88rem; margin-top: 0.45rem; }
    .quiz-header   { margin-bottom: 1.4rem; }

    .back-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text); }
    .back-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .chip.disabled { opacity: 0.25; cursor: not-allowed; }

    /* Submitting overlay */
    #submittingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      color: var(--muted);
    }
    #submittingOverlay.show { display: flex; }
  </style>
</head>
<body>
  <div id="submittingOverlay">
    <div style="font-size:2rem;animation:orbPulse 1.5s ease-in-out infinite">◎</div>
    <div>Saving your responses&hellip;</div>
  </div>

  <div class="container" id="quizContainer">
    <div class="logo">Aura Index</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="quiz-header">
      <div class="step-label" id="stepLabel"></div>
      <div class="quiz-title" id="quizTitle"></div>
      <div class="quiz-subtitle" id="quizSubtitle"></div>
    </div>

    <div class="chip-grid" id="chipGrid"></div>

    <div class="quiz-footer">
      <div style="display:flex;align-items:center;gap:1.2rem">
        <button class="back-btn" id="backBtn" disabled>← Back</button>
        <span class="counter" id="counter">0 selected</span>
      </div>
      <button class="btn" id="nextBtn" disabled>Next →</button>
    </div>
  </div>

  <script>
    const params    = new URLSearchParams(window.location.search);
    const submitter = decodeURIComponent(params.get('name') || '');
    if (!submitter) window.location.href = '/';

    const quizStartTime = Date.now();   // invisible clock starts now

    let allWords        = [];
    let maxSelections   = 12;
    let subjects        = [];   // ordered list of names to describe (others shuffled, self last)
    let currentIdx      = 0;
    const ratings       = {};   // { subjectName: Set<string> }
    let wordOrders      = {};   // { subjectName: string[] } — per-subject shuffle
    const subjectOpenAt = {};   // { subjectName: timestamp ms } — when the page first appeared
    const wordTimings   = {};   // { subjectName: { word: ms } } — ms from page-open to selection

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function updateProgress() {
      const pct = ((currentIdx + 1) / subjects.length) * 100;
      document.getElementById('progress').style.width = pct + '%';
    }

    function renderPage() {
      const subject  = subjects[currentIdx];
      const isSelf   = subject === submitter;
      const isLast   = currentIdx === subjects.length - 1;
      const selected = ratings[subject] || (ratings[subject] = new Set());

      // Header
      document.getElementById('stepLabel').textContent =
        `${currentIdx + 1} of ${subjects.length}`;
      document.getElementById('quizTitle').innerHTML = isSelf
        ? `How would you describe <em>yourself</em>?`
        : `How would you describe <em>${subject}</em>?`;
      document.getElementById('quizSubtitle').textContent = isSelf
        ? 'Select the words that feel most true to you.'
        : `Select all the words you feel describe ${subject}.`;

      // Nav buttons
      document.getElementById('backBtn').disabled = currentIdx === 0;
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = isLast ? 'Submit ✓' : 'Next →';
      nextBtn.disabled = selected.size === 0;

      // Start the invisible clock for this subject (only on first visit)
      if (!subjectOpenAt[subject]) subjectOpenAt[subject] = Date.now();
      if (!wordTimings[subject])   wordTimings[subject]   = {};

      // Build chip grid with this subject's word order
      if (!wordOrders[subject]) {
        wordOrders[subject] = shuffle(allWords);
      }
      const grid = document.getElementById('chipGrid');
      grid.innerHTML = '';
      const atLimit = () => selected.size >= maxSelections;

      function updateChipStates() {
        const full = atLimit();
        grid.querySelectorAll('.chip').forEach(c => {
          if (!c.classList.contains('selected')) {
            c.classList.toggle('disabled', full);
          }
        });
        const n = selected.size;
        document.getElementById('counter').textContent =
          `${n} / ${maxSelections} selected`;
        nextBtn.disabled = n === 0;
      }

      wordOrders[subject].forEach(word => {
        const chip = document.createElement('div');
        chip.className = 'chip' + (selected.has(word) ? ' selected' : '');
        chip.textContent = word;
        chip.addEventListener('click', () => {
          if (selected.has(word)) {
            selected.delete(word);
            chip.classList.remove('selected');
            delete wordTimings[subject][word];
          } else {
            if (atLimit()) return;                      // hard cap — ignore click
            selected.add(word);
            chip.classList.add('selected');
            wordTimings[subject][word] = Date.now() - subjectOpenAt[subject];
          }
          updateChipStates();
        });
        grid.appendChild(chip);
      });

      updateChipStates();

      updateProgress();

      // Scroll to top on subject change
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      if (currentIdx > 0) { currentIdx--; renderPage(); }
    });

    document.getElementById('nextBtn').addEventListener('click', async () => {
      if (currentIdx < subjects.length - 1) {
        currentIdx++;
        renderPage();
      } else {
        // Final submit
        document.getElementById('submittingOverlay').classList.add('show');
        const ratingsList = subjects.map(subject => ({
          subject,
          words:   [...(ratings[subject] || [])],
          timings: wordTimings[subject] || {},
        }));
        const total_ms = Date.now() - quizStartTime;
        try {
          const resp = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ submitter, ratings: ratingsList, total_ms }),
          });
          if (!resp.ok) throw new Error();
          window.location.href = `/thanks.html?name=${encodeURIComponent(submitter)}`;
        } catch {
          document.getElementById('submittingOverlay').classList.remove('show');
          alert('Something went wrong — please try again.');
        }
      }
    });

    async function init() {
      const [wordsResp, partResp, ratedResp, assignResp] = await Promise.all([
        fetch('/api/words'),
        fetch('/api/participants'),
        fetch(`/api/my-ratings/${encodeURIComponent(submitter)}`),
        fetch('/api/assignments'),
      ]);
      const wordsData        = await wordsResp.json();
      const { words }        = wordsData;
      const { participants } = await partResp.json();
      const { rated }        = await ratedResp.json();
      const assignData       = await assignResp.json();

      allWords      = words;
      maxSelections = wordsData.max_selections || 12;

      // If some people already have colors, only allow voting on those who don't
      const assignedPeople = assignData.calculated
        ? new Set(assignData.assignments.map(a => a.person))
        : new Set();
      const needsVotes = assignedPeople.size > 0
        ? participants.filter(p => !assignedPeople.has(p))
        : participants;

      // From that pool, skip anyone this submitter already rated
      const alreadyRated = new Set(rated);
      const unrated      = needsVotes.filter(p => !alreadyRated.has(p));
      const others       = shuffle(unrated.filter(p => p !== submitter));
      const selfNeeded   = unrated.includes(submitter);
      subjects           = selfNeeded ? [...others, submitter] : others;

      if (subjects.length === 0) {
        window.location.href = `/thanks.html?name=${encodeURIComponent(submitter)}`;
        return;
      }

      renderPage();
    }

    init();
  </script>
</body>
</html>
